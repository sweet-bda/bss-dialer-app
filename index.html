<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
<meta name="theme-color" content="#0F6E56"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>BSS Dialer</title>
<link rel="manifest" href="manifest.json"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,sans-serif;background:#0F6E56;color:#fff;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px}
.logo{font-size:48px}
h1{font-size:20px;font-weight:600}
p{font-size:13px;opacity:.7;text-align:center}
.status-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);border-radius:20px;padding:8px 16px;font-size:13px}
.dot{width:8px;height:8px;border-radius:50%;background:#9FE1CB;flex-shrink:0}
.dot.live{box-shadow:0 0 8px #9FE1CB;animation:pulse 1.5s infinite}
.dot.dead{background:#E24B4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.recent{width:100%;max-width:320px;background:rgba(255,255,255,.1);border-radius:12px;padding:14px}
.recent h3{font-size:11px;opacity:.6;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.number-item{font-size:16px;font-weight:500;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.1);cursor:pointer}
.number-item:last-child{border-bottom:none}
.number-item span{font-size:11px;opacity:.5;display:block;margin-top:2px}
.empty{font-size:13px;opacity:.4;text-align:center;padding:10px 0}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#085041;color:#E1F5EE;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="logo">📞</div>
<h1>BSS Dialer</h1>
<p>Bombay Sweet Shop</p>

<div class="status-pill">
  <div class="dot dead" id="dot"></div>
  <span id="statusText">Connecting...</span>
</div>

<div class="recent" id="recentBox" style="display:none">
  <h3>Recent</h3>
  <div id="recentList"><div class="empty">No calls yet</div></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyAH0_uNf8W6qybKVDZ99o4ANlmu-fphSd4",
  authDomain: "bss-dialer.firebaseapp.com",
  databaseURL: "https://bss-dialer-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bss-dialer",
  storageBucket: "bss-dialer.firebasestorage.app",
  messagingSenderId: "521966372882",
  appId: "1:521966372882:web:5a05a6071d21dd91de30cb"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let lastTs = 0;
const recent = [];

function dial(number) {
  window.location.href = 'tel:' + number;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2800);
}

function renderRecent() {
  const el = document.getElementById('recentList');
  if (!recent.length) { el.innerHTML = '<div class="empty">No calls yet</div>'; return; }
  el.innerHTML = recent.map(r =>
    `<div class="number-item" onclick="window.location.href='tel:${r.number}'">
      ${r.number}
      <span>${r.label || ''} · ${new Date(r.ts).toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'})}</span>
    </div>`
  ).join('');
}

function setStatus(live) {
  document.getElementById('dot').className = 'dot ' + (live ? 'live' : 'dead');
  document.getElementById('statusText').textContent = live ? 'Live — waiting for calls' : 'Connecting...';
  document.getElementById('recentBox').style.display = live ? '' : 'none';
}

// Listen to Firebase
const dialRef = ref(db, 'dial');
onValue(dialRef, (snapshot) => {
  setStatus(true);
  const data = snapshot.val();
  if (!data || !data.number) return;

  // Only act on new entries
  if (data.ts > lastTs) {
    lastTs = data.ts;

    // Add to recent
    recent.unshift(data);
    if (recent.length > 10) recent.pop();
    renderRecent();

    // Dial
    showToast('Dialing ' + data.number);
    setTimeout(() => dial(data.number), 300);
  }
}, (error) => {
  setStatus(false);
  console.error('Firebase error:', error);
});

setStatus(false);
</script>
</body>
</html>
